name: marida_env
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - numpy>=1.24,<2
  - matplotlib>=3.7
  - scipy>=1.10
  - scikit-learn>=1.3
  - jupyter
  - notebook
  - ipykernel
  - pip:
    - torch>=2.0.0
    - torchvision>=0.15.0
    - rasterio>=1.3,<1.5
    - shap>=0.42,<0.46
    - tensorboard>=2.13.0
